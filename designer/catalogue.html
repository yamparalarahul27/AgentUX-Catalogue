      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0f0f10; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e4e4e7; }
      #root { width: 100vw; height: 100vh; }

      /* Boot screen — visible from first paint until React mounts and
         replaces #root contents. Stops the dark frame from looking
         frozen during the JS download on first launch from the home
         screen, where the cache is cold. */
      .boot-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f10;
      }
      .boot-screen__icon {
        width: 88px;
        height: 88px;
        border-radius: 20px;
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.04); }
      }
    </style>
