<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AgentUX Catalogue</title>

    <!-- PWA / iOS home-screen install. Without these, iOS shows a
         generated "A" icon and a white flash before the SPA mounts. -->
    <meta name="theme-color" content="#0f0f10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgentUX" />
    <link rel="apple-touch-icon" href="/designer/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/designer/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/designer/icon-192.png" />
    <link rel="manifest" href="/designer/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0f0f10; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e4e4e7; }
      #root { width: 100vw; height: 100vh; }

      /* Boot screen — visible from first paint until React mounts and
         replaces #root contents. Stops the dark frame from looking
         frozen during the JS download on first launch from the home
         screen, where the cache is cold. */
      .boot-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f10;
      }
      .boot-screen__icon {
        width: 88px;
        height: 88px;
        border-radius: 20px;
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.55; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.04); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" aria-hidden="true">
        <img class="boot-screen__icon" src="/designer/apple-touch-icon.png" alt="" />
      </div>
    </div>
    <script type="module" src="/src/catalogue-main.tsx"></script>
  </body>
</html>
