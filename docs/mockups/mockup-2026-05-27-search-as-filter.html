<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Search → catalogue filter</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a0c;
    --panel: #16171b;
    --panel-2: #1c1d22;
    --line: rgba(255,255,255,0.08);
    --ink: #e6e7ea;
    --muted: #9499a3;
    --accent: #6366f1;
    --hl: rgba(99, 102, 241, 0.28);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font: 13.5px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif; min-height: 100vh; }

  /* ── State toggles ─────────────────────────────────────── */
  .scenes {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 9999;
    display: inline-flex;
    background: rgba(22,22,26,0.96);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    backdrop-filter: blur(10px);
  }
  .scenes button {
    background: transparent;
    border: 0;
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 999px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .scenes button.is-active {
    background: rgba(255,255,255,0.10);
    color: var(--ink);
  }

  /* ── Catalogue header ─────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    height: 56px;
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(14,14,16,0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  .header-logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 13px;
  }
  .header-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    margin-left: 16px;
  }
  .header-tabs button {
    background: transparent;
    border: 0;
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 999px;
    font: inherit;
    font-size: 12.5px;
    cursor: pointer;
  }
  .header-tabs button.is-active {
    background: rgba(255,255,255,0.10);
    color: var(--ink);
  }
  .header-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .header-search-trigger {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 32px;
    padding: 0 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 12.5px;
    cursor: pointer;
  }
  .header-search-trigger kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .identity-pill {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12.5px;
  }

  /* ── Banner: "Showing N matches" ──────────────────────── */
  .search-banner {
    display: none;
    padding: 16px 24px 8px;
    background: rgba(99, 102, 241, 0.04);
    border-bottom: 1px solid rgba(99, 102, 241, 0.18);
  }
  body.is-scoped .search-banner { display: block; }
  .search-banner__title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .search-banner__title h2 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
  }
  .search-banner__title .hl { background: var(--hl); padding: 1px 6px; border-radius: 4px; }
  .search-banner__count {
    color: var(--muted);
    font-size: 12px;
  }
  .search-banner__hint {
    color: var(--muted);
    font-size: 12px;
  }
  .search-banner__hint kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink);
  }

  /* ── Toolbar ───────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--line);
  }
  .toolbar-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    padding: 0 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    color: var(--ink);
    font-size: 12.5px;
    cursor: pointer;
  }
  .toolbar-pill--primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    margin-left: auto;
  }
  .filter-pills {
    display: none;
    padding: 4px 24px 12px;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  body.is-scoped .filter-pills { display: flex; }
  .filter-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    background: rgba(99, 102, 241, 0.12);
    border: 1px solid rgba(99, 102, 241, 0.32);
    color: #c7d2fe;
    font-size: 12px;
  }
  .filter-pill .x {
    cursor: pointer;
    opacity: 0.6;
  }
  .filter-pill .x:hover { opacity: 1; }
  .filter-pill--search { background: rgba(99, 102, 241, 0.22); }
  .filter-pills__clear {
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    margin-left: auto;
    padding: 4px 10px;
  }
  .filter-pills__clear:hover { color: var(--ink); }

  /* ── Catalogue grid ───────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 18px 24px 60px;
  }
  .card {
    background: var(--panel-2);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--line);
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(99, 102, 241, 0.4);
  }
  .card-thumb {
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--c1, #3a4256), var(--c2, #1d2030));
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .card-body {
    padding: 10px 12px 14px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .hl {
    background: var(--hl);
    color: #eef2ff;
    border-radius: 3px;
    padding: 0 2px;
    font-weight: 600;
  }
  /* When in scoped mode, fade out non-matching cards */
  body.is-scoped .card:not([data-match]) { display: none; }

  /* Variant gradient palette by data-kind */
  .card[data-kind="auth"] .card-thumb    { --c1: #5a3b7a; --c2: #2b1d40; }
  .card[data-kind="wallet"] .card-thumb  { --c1: #2c5b6b; --c2: #16323b; }
  .card[data-kind="backup"] .card-thumb  { --c1: #6b4a2c; --c2: #3b2b16; }
  .card[data-kind="markets"] .card-thumb { --c1: #3a5a3c; --c2: #1d301e; }
  .card[data-kind="trade"] .card-thumb   { --c1: #495378; --c2: #232a40; }

  /* ── Search modal ──────────────────────────────────────── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(8, 8, 11, 0.75);
    backdrop-filter: blur(6px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding-top: 96px;
    z-index: 100;
  }
  body.is-modal .modal-backdrop { display: flex; }

  .modal {
    width: min(680px, calc(100% - 32px));
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .modal-field {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }
  .modal-field svg { color: var(--muted); }
  .modal-field input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: none;
    color: var(--ink);
    font: inherit;
    font-size: 16px;
  }
  .modal-field input::placeholder { color: var(--muted); }
  .modal-field .modal-close {
    background: transparent;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .modal-field .modal-close:hover { background: rgba(255,255,255,0.06); color: var(--ink); }

  .modal-results {
    max-height: 380px;
    overflow-y: auto;
    padding: 4px 8px;
  }
  .modal-section-label {
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 10px 6px;
  }
  .modal-card-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 0 2px 2px;
  }
  .modal-card {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px;
    cursor: pointer;
    text-align: left;
  }
  .modal-card.is-active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.18);
  }
  .modal-card-thumb {
    aspect-ratio: 4 / 3;
    border-radius: 5px;
    background: linear-gradient(135deg, var(--c1, #5a3b7a), var(--c2, #2b1d40));
    margin-bottom: 6px;
  }
  .modal-card-title {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 2px;
  }
  .modal-card-meta {
    font-size: 10.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 1px 2px 0;
  }
  .modal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .modal-row:hover { background: rgba(255,255,255,0.04); }
  .modal-row-icon {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    background: rgba(255,255,255,0.05);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
  }
  .modal-row-main { flex: 1; font-size: 13px; }
  .modal-row-meta { color: var(--muted); font-size: 11.5px; }

  .modal-commit {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-top: 1px solid var(--line);
    background: rgba(99,102,241,0.06);
    cursor: pointer;
  }
  .modal-commit:hover { background: rgba(99,102,241,0.10); }
  .modal-commit__label { color: var(--ink); font-size: 13px; }
  .modal-commit__hint { color: var(--muted); font-size: 11.5px; display: inline-flex; align-items: center; gap: 4px; }
  .modal-commit__hint kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink);
  }

  .hl { background: var(--hl); color: #eef2ff; border-radius: 3px; padding: 0 2px; font-weight: 600; }
</style>
</head>
<body>

<!-- ── Scene toggles ────────────────────────────────────── -->
<div class="scenes">
  <button data-scene="resting" class="is-active">1. Resting</button>
  <button data-scene="modal">2. Modal open</button>
  <button data-scene="scoped">3. Search committed</button>
</div>

<!-- ── Catalogue header ─────────────────────────────────── -->
<header class="header">
  <div class="header-logo">
    <span class="header-logo-mark">A</span>
    <span>AgentUX</span>
  </div>
  <div class="header-tabs">
    <button class="is-active">Catalogue</button>
    <button>Videos</button>
  </div>
  <div class="header-right">
    <button class="header-search-trigger" data-action="open-modal">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Search</span>
      <kbd>/</kbd>
    </button>
    <span class="identity-pill">R</span>
  </div>
</header>

<!-- ── Banner shown only when scoped to a search query ─── -->
<div class="search-banner">
  <div class="search-banner__title">
    <h2>Search results for <span class="hl">secure</span></h2>
    <span class="search-banner__count">24 matches in catalogue</span>
  </div>
  <div class="search-banner__hint">
    Press <kbd>/</kbd> to refine · <kbd>Esc</kbd> to exit search · or click a card to open it
  </div>
</div>

<!-- ── Toolbar ──────────────────────────────────────────── -->
<div class="toolbar">
  <button class="toolbar-pill">Filters</button>
  <button class="toolbar-pill">Group ▾</button>
  <button class="toolbar-pill">Flow ▾</button>
  <button class="toolbar-pill">Platform ▾</button>
  <button class="toolbar-pill" style="margin-left: auto;">Latest ▾</button>
  <button class="toolbar-pill toolbar-pill--primary">+ Quick Upload</button>
</div>

<!-- ── Filter pills (visible only in scoped mode) ───────── -->
<div class="filter-pills">
  <span class="filter-pill filter-pill--search">
    <span>Search: secure</span>
    <span class="x" data-action="clear-search">×</span>
  </span>
  <button class="filter-pills__clear" data-action="clear-all">Clear all</button>
</div>

<!-- ── Catalogue grid ───────────────────────────────────── -->
<div class="grid">
  <!-- Matches "secure" -->
  <button class="card" data-kind="auth" data-match>
    <div class="card-thumb">9:19.5</div>
    <div class="card-body">
      <div class="card-title"><span class="hl">Secure</span> Your Account</div>
      <div class="card-meta">Auth · Settings · Web</div>
    </div>
  </button>
  <button class="card" data-kind="wallet" data-match>
    <div class="card-thumb">16:10</div>
    <div class="card-body">
      <div class="card-title"><span class="hl">Secure</span> Wallet</div>
      <div class="card-meta">Wallet · Onboarding · Mobile</div>
    </div>
  </button>
  <button class="card" data-kind="backup" data-match>
    <div class="card-thumb">3:4</div>
    <div class="card-body">
      <div class="card-title"><span class="hl">Secure</span> backup setup</div>
      <div class="card-meta">Backup · Settings · Mobile</div>
    </div>
  </button>
  <button class="card" data-kind="auth" data-match>
    <div class="card-thumb">16:10</div>
    <div class="card-body">
      <div class="card-title"><span class="hl">Secure</span> sign-in</div>
      <div class="card-meta">Auth · Login · Web</div>
    </div>
  </button>
  <button class="card" data-kind="backup" data-match>
    <div class="card-thumb">9:19.5</div>
    <div class="card-body">
      <div class="card-title"><span class="hl">Secure</span> recovery phrase</div>
      <div class="card-meta">Backup · Setup · Mobile</div>
    </div>
  </button>
  <button class="card" data-kind="auth" data-match>
    <div class="card-thumb">9:19.5</div>
    <div class="card-body">
      <div class="card-title">Two-factor (<span class="hl">Secure</span>)</div>
      <div class="card-meta">Auth · Settings · Mobile</div>
    </div>
  </button>

  <!-- Doesn't match — hidden in scoped mode -->
  <button class="card" data-kind="trade">
    <div class="card-thumb">16:10</div>
    <div class="card-body">
      <div class="card-title">Trade dashboard</div>
      <div class="card-meta">Trade · Home · Web</div>
    </div>
  </button>
  <button class="card" data-kind="markets">
    <div class="card-thumb">16:10</div>
    <div class="card-body">
      <div class="card-title">Market overview</div>
      <div class="card-meta">Markets · Home · Web</div>
    </div>
  </button>
  <button class="card" data-kind="wallet">
    <div class="card-thumb">9:19.5</div>
    <div class="card-body">
      <div class="card-title">Wallet home</div>
      <div class="card-meta">Wallet · Home · Mobile</div>
    </div>
  </button>
  <button class="card" data-kind="trade">
    <div class="card-thumb">9:19.5</div>
    <div class="card-body">
      <div class="card-title">Order placed</div>
      <div class="card-meta">Trade · Order · Mobile</div>
    </div>
  </button>
  <button class="card" data-kind="markets">
    <div class="card-thumb">9:19.5</div>
    <div class="card-body">
      <div class="card-title">Token detail</div>
      <div class="card-meta">Markets · Detail · Mobile</div>
    </div>
  </button>
  <button class="card" data-kind="backup">
    <div class="card-thumb">16:10</div>
    <div class="card-body">
      <div class="card-title">Backup status</div>
      <div class="card-meta">Backup · Status · Web</div>
    </div>
  </button>
</div>

<!-- ── Search modal (slim, top-anchored) ────────────────── -->
<div class="modal-backdrop" data-action="close-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-field">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" value="secure" placeholder="Search Groups, Flows, Screenshots…" />
      <button class="modal-close" data-action="close-modal">×</button>
    </div>

    <div class="modal-results">
      <!-- Slimmed preview: 3 screenshots top, then 1-2 groups / flows -->
      <div class="modal-section-label">Screenshots · 24 matches</div>
      <div class="modal-card-row">
        <button class="modal-card is-active" data-kind="auth">
          <div class="modal-card-thumb" style="--c1:#5a3b7a;--c2:#2b1d40;"></div>
          <div class="modal-card-title"><span class="hl">Secure</span> Your Account</div>
          <div class="modal-card-meta">Auth · Settings</div>
        </button>
        <button class="modal-card" data-kind="wallet">
          <div class="modal-card-thumb" style="--c1:#2c5b6b;--c2:#16323b;"></div>
          <div class="modal-card-title"><span class="hl">Secure</span> Wallet</div>
          <div class="modal-card-meta">Wallet · Onboarding</div>
        </button>
        <button class="modal-card" data-kind="backup">
          <div class="modal-card-thumb" style="--c1:#6b4a2c;--c2:#3b2b16;"></div>
          <div class="modal-card-title"><span class="hl">Secure</span> backup</div>
          <div class="modal-card-meta">Backup · Settings</div>
        </button>
      </div>

      <div class="modal-section-label">Groups · 1 match</div>
      <button class="modal-row">
        <span class="modal-row-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </span>
        <span class="modal-row-main"><span class="hl">Secur</span>ity</span>
        <span class="modal-row-meta">3 flows</span>
      </button>

      <div class="modal-section-label">Flows · 1 match</div>
      <button class="modal-row">
        <span class="modal-row-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </span>
        <span class="modal-row-main">Settings &gt; <span class="hl">Securi</span>ty</span>
        <span class="modal-row-meta">Auth · 5 screens</span>
      </button>
    </div>

    <!-- ── Commit-to-catalogue CTA ──────────────────── -->
    <button class="modal-commit" data-action="commit-search">
      <span class="modal-commit__label">View all 24 results in catalogue ↗</span>
      <span class="modal-commit__hint">
        or press <kbd>↵</kbd> Return
      </span>
    </button>
  </div>
</div>

<script>
  const body = document.body;
  const scenes = document.querySelectorAll('.scenes button');
  function setScene(name) {
    body.classList.remove('is-scoped', 'is-modal');
    if (name === 'scoped') body.classList.add('is-scoped');
    if (name === 'modal') body.classList.add('is-modal');
    scenes.forEach(b => b.classList.toggle('is-active', b.dataset.scene === name));
  }
  scenes.forEach(b => b.addEventListener('click', () => setScene(b.dataset.scene)));

  document.addEventListener('click', (e) => {
    const a = e.target.closest?.('[data-action]');
    if (!a) return;
    switch (a.dataset.action) {
      case 'open-modal': setScene('modal'); break;
      case 'close-modal': setScene(body.classList.contains('is-scoped') ? 'scoped' : 'resting'); break;
      case 'commit-search': setScene('scoped'); break;
      case 'clear-search':
      case 'clear-all': setScene('resting'); break;
    }
  });

  // Keyboard: / opens modal, Esc closes / clears
  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement?.tagName !== 'INPUT') {
      e.preventDefault();
      setScene('modal');
    }
    if (e.key === 'Escape') {
      if (body.classList.contains('is-modal')) setScene(body.classList.contains('is-scoped') ? 'scoped' : 'resting');
      else if (body.classList.contains('is-scoped')) setScene('resting');
    }
    if (e.key === 'Enter' && body.classList.contains('is-modal')) {
      e.preventDefault();
      // In real impl: if no card hovered/active, commit. If active card, open lightbox.
      setScene('scoped');
    }
  });
</script>

</body>
</html>
