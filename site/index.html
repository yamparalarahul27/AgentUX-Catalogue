<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentUX Catalogue — A living atlas of crypto product UX</title>
    <meta
      name="description"
      content="Screenshots, video references, and shared flows — organised by app, searchable by pattern, sliceable by anything you've labelled."
    />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./supabase-config.js"></script>
    <script defer src="./group-masonry.js"></script>
  </head>
  <body>
    <div class="site">
      <header class="topbar">
        <a class="brand" href="#top" aria-label="AgentUX home" title="AgentUX">
          <img src="./logo.svg" alt="" width="32" height="32" />
          <span>AgentUX</span>
        </a>
      </header>

      <main id="top">
        <!-- ─── Hero ─── -->
        <section class="hero">
          <p class="eyebrow">Open source · Self-hosted</p>
          <h1>A living atlas of crypto product UX.</h1>
          <p class="hero-text">
            Screenshots, video references, and shared flows — organised by app,
            searchable by pattern, sliceable by anything you've labelled.
          </p>
          <div class="hero-actions">
            <a class="button-hero button-deploy" href="/designer/">Open the catalogue →</a>
          </div>
        </section>

        <!-- Group icons masonry — fetched live from Supabase anon -->
        <div class="group-masonry" id="group-masonry" aria-label="Apps in the catalogue"></div>
      </main>

      <footer class="footer">
        <div class="footer-brand">
          <img src="./logo.svg" alt="" width="20" height="20" />
          <strong>AgentUX Catalogue</strong>
          <span class="footer-sep">·</span>
          <span class="footer-author">Built by Yamparala Rahul</span>
        </div>
        <div class="footer-links">
          <a href="https://github.com/yamparalarahul27/agentux">GitHub</a>
          <a href="/designer/changelog">Changelog</a>
        </div>
      </footer>
    </div>
  </body>
</html>
